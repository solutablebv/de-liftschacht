<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schrijf je in — De Liftschacht | LYFD</title>
  <meta name="description" content="Schrijf je in voor De Liftschacht nieuwsbrief. Volgende donderdag in jouw inbox. Gratis, geen spam.">
  <meta name="robots" content="index, follow">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛗</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand: #4928FD;
      --brand-light: #EDE8FF;
      --brand-glow: rgba(73, 40, 253, 0.12);
      --text: #1B1D1E;
      --text-muted: #6B7280;
      --text-light: #9CA3AF;
      --bg: #FFFFFF;
      --font-sans: 'Inter Tight', -apple-system, sans-serif;
      --font-serif: 'Instrument Serif', Georgia, serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

    body {
      font-family: var(--font-sans); color: var(--text); background: var(--bg);
      line-height: 1.7; font-size: 16px; overflow-x: hidden;
    }

    /* ─── GRAIN ─── */
    body::after {
      content: ''; position: fixed; inset: 0; z-index: 9997; pointer-events: none;
      opacity: 0.022;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
    }

    /* ─── NAV ─── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 16px 40px; display: flex; align-items: center; justify-content: space-between;
      background: rgba(255,255,255,0.9); backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px); border-bottom: 1px solid rgba(0,0,0,0.04);
    }
    .nav-logo { font-weight: 800; font-size: 22px; color: var(--text); letter-spacing: 1.5px; text-decoration: none; }
    .nav-cta {
      font-weight: 600; font-size: 14px; color: #fff; background: var(--brand);
      padding: 10px 22px; border-radius: 999px; text-decoration: none;
      transition: transform 0.2s cubic-bezier(0.22,1,0.36,1), box-shadow 0.2s ease;
      box-shadow: 0 2px 8px rgba(73,40,253,0.2);
    }
    .nav-cta:hover { transform: scale(1.04); box-shadow: 0 4px 16px rgba(73,40,253,0.3); }
    .nav-cta:focus-visible { outline: 2px solid var(--brand); outline-offset: 2px; }
    .nav-cta:active { transform: scale(0.97); }

    /* ─── SIGNUP PAGE ─── */
    main {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
      padding: 140px 32px 80px; position: relative; overflow: hidden;
    }

    .signup-page-bg { position: absolute; inset: 0; z-index: -1; overflow: hidden; }
    .signup-page-bg .orb {
      position: absolute; border-radius: 50%; filter: blur(80px);
      animation: orbFloat 20s ease-in-out infinite;
    }
    .signup-page-bg .orb:nth-child(1) { width: 500px; height: 500px; background: var(--brand); top: -10%; right: -5%; opacity: 0.12; }
    .signup-page-bg .orb:nth-child(2) { width: 400px; height: 400px; background: #E07A4F; bottom: -10%; left: -5%; animation-delay: -7s; opacity: 0.08; }
    .signup-page-bg .orb:nth-child(3) { width: 300px; height: 300px; background: #4A6CF5; top: 30%; left: 50%; animation-delay: -14s; opacity: 0.06; }
    @keyframes orbFloat {
      0%,100% { transform: translate(0,0) scale(1); }
      25% { transform: translate(30px,-20px) scale(1.05); }
      50% { transform: translate(-20px,30px) scale(0.95); }
      75% { transform: translate(10px,10px) scale(1.02); }
    }

    .signup-page-header {
      margin-bottom: 96px; animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.2s forwards; opacity: 0;
    }

    .signup-page-header h1 {
      font-weight: 800; font-size: clamp(40px, 6vw, 72px); line-height: 1.1;
      letter-spacing: -0.03em; color: var(--text); margin-bottom: 16px;
    }

    .signup-page-header .accent {
      font-family: var(--font-serif); font-style: italic; font-weight: 400;
      color: var(--brand); display: block;
    }

    .signup-page-header p {
      font-size: 17px; color: var(--text-muted); max-width: 520px; margin: 16px auto 0;
      line-height: 1.7;
    }

    /* Elevator form container */
    .elevator-form-page {
      position: relative;
      /* background: #0a0a0a; */
      width: 100%; max-width: 600px;
      /* padding: 48px 40px; border-radius: 20px; */
      display: flex; flex-direction: column; align-items: center;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      border: 1px solid rgba(255,255,255,0.08);
      animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.4s forwards; opacity: 0;
    }

    .elevator-form-page h3 {
      font-size: 24px; font-weight: 700; margin-bottom: 8px; color: #fff;
      font-family: var(--font-sans);
    }

    .elevator-form-page > p {
      font-size: 14px; color: rgba(255,255,255,0.6); margin-bottom: 32px; line-height: 1.5;
    }

    .elevator-form-page .hs-form-frame, .elevator-form-page .hbspt-form {
      width: 100% !important;
    }

    /* HubSpot form styling */
    .hs-form-frame {
      width: 100% !important;
      max-width: 100% !important;
    }

    .hs-form, .hbspt-form {
      width: 100% !important;
      background: transparent !important;
    }

    .hs-form-field {
      margin-bottom: 16px !important;
      width: 100% !important;
    }

    .hs-form-field label {
      display: block !important;
      font-size: 13px !important;
      font-weight: 500 !important;
      color: rgba(255,255,255,0.8) !important;
      margin-bottom: 6px !important;
      text-align: left !important;
      font-family: var(--font-sans) !important;
    }

    .hs-input, .hs-fieldtype-text input, .hs-fieldtype-email input, input.hs-input {
      width: 100% !important;
      padding: 12px 14px !important;
      border: 1px solid rgba(255,255,255,0.2) !important;
      border-radius: 8px !important;
      font-size: 15px !important;
      color: #fff !important;
      background: rgba(255,255,255,0.08) !important;
      font-family: var(--font-sans) !important;
      transition: border-color 0.2s ease, box-shadow 0.2s ease !important;
      box-sizing: border-box !important;
    }

    .hs-input::placeholder, .hs-fieldtype-text input::placeholder, .hs-fieldtype-email input::placeholder, input.hs-input::placeholder {
      color: rgba(255,255,255,0.4) !important;
    }

    .hs-input:focus, .hs-fieldtype-text input:focus, .hs-fieldtype-email input:focus, input.hs-input:focus {
      border-color: var(--brand) !important;
      box-shadow: 0 0 0 3px rgba(73,40,253,0.3) !important;
      outline: none !important;
      background: rgba(255,255,255,0.12) !important;
    }

    .hs-fieldtype-textarea textarea {
      width: 100% !important;
      padding: 12px 14px !important;
      border: 1px solid rgba(255,255,255,0.2) !important;
      border-radius: 8px !important;
      font-size: 15px !important;
      color: #fff !important;
      background: rgba(255,255,255,0.08) !important;
      font-family: var(--font-sans) !important;
      box-sizing: border-box !important;
    }

    .hs-form-checkbox {
      margin-bottom: 12px !important;
    }

    .hs-form-checkbox label, .hs-fieldtype-checkbox label {
      font-size: 13px !important;
      font-weight: 400 !important;
      color: rgba(255,255,255,0.7) !important;
      cursor: pointer !important;
      margin-left: 6px !important;
    }

    .hs-form-checkbox input[type="checkbox"], .hs-fieldtype-checkbox input[type="checkbox"] {
      width: 18px !important;
      height: 18px !important;
      cursor: pointer !important;
    }

    .hs-button {
      padding: 12px 28px !important;
      border-radius: 8px !important;
      font-size: 15px !important;
      font-weight: 600 !important;
      border: none !important;
      cursor: pointer !important;
      font-family: var(--font-sans) !important;
      background: var(--brand) !important;
      color: white !important;
      transition: transform 0.2s cubic-bezier(0.22,1,0.36,1), box-shadow 0.2s ease !important;
      width: 100% !important;
    }

    .hs-button:hover {
      transform: translateY(-1px) !important;
      box-shadow: 0 4px 20px rgba(73,40,253,0.35) !important;
    }

    .hs-button:active {
      transform: translateY(0) scale(0.98) !important;
    }

    .hs-form-required {
      color: var(--brand) !important;
    }

    /* Error and success states */
    .hs-error-msgs { font-size: 12px !important; color: #ff6b6b !important; margin-top: 4px !important; }
    .hs-form-field.hs-error-field input { border-color: #ff6b6b !important; }
    .inputs-list { margin: 0 !important; background: transparent !important; }

    footer {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 99;
      padding: 24px 32px; text-align: center;
      background: rgba(255,255,255,0.9); backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px); border-top: 1px solid rgba(0,0,0,0.04);
      display: flex; align-items: center; justify-content: center; gap: 12px;
    }

    .footer-logo { font-weight: 800; font-size: 16px; color: var(--text); letter-spacing: 1.5px; }
    .footer-text { font-size: 13px; color: var(--text-muted); }
    .footer-link { color: var(--brand); text-decoration: none; font-weight: 600; }
    .footer-link:hover { opacity: 0.7; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 720px) {
      nav { padding: 12px 20px; }
      .nav-logo { font-size: 18px; }
      .nav-cta { padding: 8px 18px; font-size: 13px; }

      main { padding: 120px 20px 100px; }
      .signup-page-header { margin-bottom: 60px; }
      .signup-page-header h1 { font-size: clamp(28px, 5vw, 40px); }
      .signup-page-header p { font-size: 15px; }

      .elevator-form-page { padding: 32px 24px; border-radius: 16px; }
      .elevator-form-page h3 { font-size: 20px; }

      footer { padding: 16px 20px; flex-direction: column; gap: 8px; }
      .footer-logo { font-size: 14px; }
      .footer-text { font-size: 12px; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="nav-logo">LIFTSCHACHT</a>
    <a href="/" class="nav-cta">← Terug</a>
  </nav>

  <main>
    <div class="signup-page-bg">
      <div class="orb"></div>
      <div class="orb"></div>
      <div class="orb"></div>
    </div>

    <div class="signup-page-header">
      <h1>Volgende donderdag<span class="accent">in jouw inbox.</span></h1>
      <p>Sluit je aan bij <strong>500+ liftprofessionals</strong> die elke week mee lezen. Gratis, geen spam.</p>
    </div>

    <div class="elevator-form-page">
      <script src="https://js.hsforms.net/forms/embed/48508249.js" defer></script>
        <div class="hs-form-frame" data-region="na1" 
            data-form-id="1a5b1318-ac8c-4eca-b07a-8780328ab93a" 
            data-portal-id="48508249"></div>
    </div>
  </main>

  <footer>
    <div class="footer-logo">LYFD</div>
    <div class="footer-text"><a href="https://lyfd.nl" class="footer-link">lyfd.nl</a> &middot; Capaciteit die je vertrouwt.</div>
  </footer>
</body>
</html>
